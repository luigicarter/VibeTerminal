name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run smoke tests
        shell: pwsh
        run: |
          npm run smoke:backend:codex-discovery
          npm run smoke:backend:claude-discovery
          npm run smoke:backend:agent-telemetry
          npm run smoke:backend:code-changes
          npm run smoke:backend:updates
          npm run smoke:frontend:attention
          npm run smoke:frontend:workspace
          npm run smoke:frontend:session-launch

      - name: Build installer for release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: vibeTerminal-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
