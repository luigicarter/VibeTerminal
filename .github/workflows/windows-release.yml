name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare embedded Codex binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $versions = @(Get-ChildItem -LiteralPath "vendor/codex-appserver" -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+$' })
          if ($versions.Count -ne 1) {
            throw "Expected exactly one vendored Codex app-server version, found $($versions.Count)."
          }
          $version = $versions[0].Name
          npm install -g "@openai/codex@$version"
          npm run prepare:codex-bin:required

      - name: Typecheck
        run: npm run typecheck

      - name: Run smoke tests
        shell: pwsh
        run: |
          npm run smoke:backend:codex-discovery
          npm run smoke:backend:claude-discovery
          npm run smoke:backend:agent-telemetry
          npm run smoke:backend:code-changes
          npm run smoke:backend:updates
          npm run smoke:backend:fusion-launch
          npm run smoke:backend:fusion-adapter
          npm run smoke:backend:fusion-chat-parse
          npm run smoke:backend:fusion-appserver:embedded
          npm run smoke:frontend:attention
          npm run smoke:frontend:workspace
          npm run smoke:frontend:session-launch
          npm run smoke:frontend:tiled-resize

      - name: Build installer for release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify embedded Codex was packaged
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $codex = "release/win-unpacked/resources/codex-bin/win32-x64/codex.exe"
          if (-not (Test-Path -LiteralPath $codex)) {
            throw "Missing packaged embedded Codex binary: $codex"
          }

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $version = $tag.TrimStart("v")
          $files = @(
            "release/vibeTerminal-Setup-$version.exe",
            "release/vibeTerminal-Setup-$version.exe.blockmap",
            "release/latest.yml"
          )

          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Missing release asset: $file"
            }
          }

          if (gh release view $tag --repo $repo *> $null) {
            gh release upload $tag @files --repo $repo --clobber
          } else {
            gh release create $tag @files --repo $repo --title $version --latest --generate-notes
          }

      - name: Build installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify embedded Codex was packaged for artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $codex = "release/win-unpacked/resources/codex-bin/win32-x64/codex.exe"
          if (-not (Test-Path -LiteralPath $codex)) {
            throw "Missing packaged embedded Codex binary: $codex"
          }

      - name: Upload installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: vibeTerminal-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
